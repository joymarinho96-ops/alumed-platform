<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profe Joy IA — ALUMED OS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0e1117; /* Streamlit dark theme default background */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Un pequeño overlay de carga para que no se vea blanco al iniciar */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #7c6bff;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: -1;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(124, 107, 255, 0.2);
            border-top-color: #7c6bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        Conectando con Profe Joy...
    </div>
    <!-- embed=true oculta la barra superior por defecto de Streamlit y lo hace sentir como parte de ALUMED OS -->
    <iframe src="https://alumedspace.streamlit.app/?embed=true" allow="clipboard-write; camera; microphone; fullscreen" title="Profe Joy IA"></iframe>
</body>
</html>
