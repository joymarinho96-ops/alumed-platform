{% extends 'accounts/auth_base.html' %}
{% load static %}

{% block auth_content %}
    <div style="text-align: center; position: relative; z-index: 1;">

        <!-- Ícone Animado SVG -->
        <div class="success-animation">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none" />
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
            </svg>
        </div>

        <div class="auth-header" style="margin-top: 20px;">
            <h2 style="
                color: #2ecc71;
                font-family: 'Inter', sans-serif;
                font-size: 2rem;
                margin-bottom: 10px;
                font-weight: 700;
                letter-spacing: -0.5px;
                opacity: 0;
                animation: fadeInUp 0.6s ease-out 0.5s forwards;
            ">¡Pago Exitoso!</h2>
            <p style="
                color: var(--muted);
                font-size: 1.05rem;
                opacity: 0;
                animation: fadeInUp 0.6s ease-out 0.7s forwards;
            ">Tu compra ha sido procesada correctamente.</p>
        </div>

        <!-- Detalhes / Mensagem -->
        <div style="
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.9s forwards;
        ">
            <p style="color: white; line-height: 1.6; font-size: 1rem; margin-bottom: 10px;">
                El curso ya ha sido añadido a tu panel de estudiante.
            </p>
            <p style="color: var(--muted); font-size: 0.9rem;">
                ¡Estás listo para comenzar tu aprendizaje!
            </p>
        </div>

        <!-- Botão -->
        <a href="{% url 'student_dashboard' %}" class="auth-btn" style="
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 1.1s forwards;
        ">
            <span>Ir a Mis Cursos</span>
            <i class="fas fa-arrow-right"></i>
        </a>
    </div>

    <style>
        /* Animação de Checkmark */
        .success-animation { margin: 0 auto 20px; width: 80px; height: 80px; }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #2ecc71;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #2ecc71;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
            position: relative;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #2ecc71;
            fill: rgba(46, 204, 113, 0.1); /* Fundo levemente verde */
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes scale {
            0%, 100% { transform: none; }
            50% { transform: scale3d(1.1, 1.1, 1); }
        }

        @keyframes fill {
            100% { box-shadow: inset 0px 0px 0px 50px rgba(46, 204, 113, 0.1); } /* Preenchimento sutil */
        }

        /* Animação de Entrada dos Textos */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-btn:hover {
            transform: translateY(-2px) !important; /* Override animation transform se necessário, mas aqui o animation já terminou */
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.35) !important;
            background: #27ae60 !important;
        }
    </style>
{% endblock %}
