{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2 class="neon-text">Nueva Contraseña</h2>
        <p style="color: #ccc; margin-bottom: 20px;">Ingresa tu nueva contraseña.</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small style="color: #888; display: block; margin-top: 5px;">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                        <div style="color: #ff4444; font-size: 0.9rem;">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="btn-3d-buy" style="width: 100%; margin-top: 20px;">Cambiar Contraseña</button>
        </form>
    </div>
</div>

<style>
    .auth-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding-top: 100px;
    }
    .auth-container {
        background: rgba(10, 10, 15, 0.8);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid var(--dourado);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 0 20px rgba(245, 197, 66, 0.2);
    }
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; color: var(--dourado); margin-bottom: 5px; font-weight: bold; }
    .form-group input {
        width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444;
        background: #1a1a1a; color: #fff; font-family: 'Share Tech Mono', monospace;
    }
    .form-group input:focus { outline: none; border-color: var(--dourado); }
</style>
{% endblock %}
