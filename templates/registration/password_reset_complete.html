{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-container" style="text-align: center;">
        <h2 class="neon-text">¡Contraseña Cambiada!</h2>
        <p style="color: #ccc;">Tu contraseña ha sido restablecida con éxito. Ahora puedes iniciar sesión con tu nueva contraseña.</p>
        <a href="{% url 'login' %}" class="btn-3d-buy" style="margin-top: 20px;">Iniciar Sesión</a>
    </div>
</div>

<style>
    .auth-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding-top: 100px;
    }
    .auth-container {
        background: rgba(10, 10, 15, 0.8);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid var(--dourado);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 0 20px rgba(245, 197, 66, 0.2);
    }
</style>
{% endblock %}
