{% extends 'dashboard_base.html' %}
{% load static %}

{% block title %}{{ course.title }} - Profe Joy AI{% endblock %}

{% block main_content %}
<div class="ai-tutor-wrapper" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px;">
    
    <!-- Glassmorphism Card Container -->
    <div style="background: rgba(30, 17, 59, 0.45); border: 1px solid rgba(124, 58, 237, 0.25); border-radius: 24px; padding: 40px 30px; max-width: 550px; width: 100%; text-align: center; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 15px 35px rgba(18, 9, 36, 0.4); z-index: 5; position: relative;">
        
        <!-- Glowing Brain / AI Icon -->
        <div style="width: 80px; height: 80px; background: rgba(124, 58, 237, 0.15); border: 1.5px solid rgba(124, 58, 237, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: var(--dourado); font-size: 2.2rem; box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);">
            <i class="fas fa-brain"></i>
        </div>

        <h1 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; color: white; margin-bottom: 8px;">{{ course.title }}</h1>
        <p style="font-family: 'Inter', sans-serif; font-size: 14px; color: var(--dourado); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px;">Entrenamiento de Examen Oral con IA</p>

        <!-- Waveform Visualizer Mock -->
        <div id="voice-visualizer" style="width: 100%; height: 100px; border-radius: 16px; background: rgba(18, 9, 36, 0.4); border: 1px solid rgba(124, 58, 237, 0.2); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 15px; position: relative; overflow: hidden;">
            <div class="wave-bar" style="width: 4px; height: 15px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 25px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 35px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 20px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 30px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 40px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 15px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
            <div class="wave-bar" style="width: 4px; height: 25px; background: var(--dourado); border-radius: 4px; transition: height 0.15s ease;"></div>
        </div>

        <p id="status" style="font-family: 'Inter', sans-serif; font-size: 15px; color: #cbd5e1; margin-bottom: 30px;" class="status-text">Presiona el micrófono para iniciar la conversación</p>
        
        <!-- Glowing Mic Button -->
        <button id="mic-button" class="mic-button" style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); border: none; cursor: pointer; font-size: 2rem; color: white; box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3); transition: transform 0.2s, box-shadow 0.2s; display: inline-flex; align-items: center; justify-content: center;">
            <i class="fas fa-microphone"></i>
        </button>
    </div>
</div>

<style>
    .mic-button:hover {
        transform: scale(1.08);
        box-shadow: 0 12px 30px rgba(124, 58, 237, 0.45);
    }
    .mic-button.is-listening {
        animation: pulse-mic 1.5s infinite;
    }
    @keyframes pulse-mic {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); background: #ef4444; }
        70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); background: #f87171; }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); background: #ef4444; }
    }
</style>

<script>
    const micButton = document.getElementById('mic-button');
    const statusText = document.getElementById('status');
    const waveBars = document.querySelectorAll('.wave-bar');
    let isListening = false;
    let waveInterval;

    function animateWave() {
        waveBars.forEach(bar => {
            const height = Math.floor(Math.random() * 50) + 15;
            bar.style.height = height + 'px';
        });
    }

    micButton.addEventListener('click', () => {
        isListening = !isListening;
        if (isListening) {
            micButton.classList.add('is-listening');
            statusText.textContent = "Escuchando tu respuesta...";
            waveInterval = setInterval(animateWave, 150);
        } else {
            micButton.classList.remove('is-listening');
            statusText.textContent = "Procesando audio...";
            clearInterval(waveInterval);
            waveBars.forEach(bar => bar.style.height = '15px');
        }
    });
</script>
{% endblock %}
