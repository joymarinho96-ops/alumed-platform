{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course.title }} - ALUMED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <style>
        body {
            overflow: hidden;
            background-color: #0a000f;
        }
        .ai-tutor-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        #voice-visualizer {
            width: 100%;
            max-width: 500px;
            height: 150px;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(245, 197, 66, 0.3);
            margin-bottom: 30px;
        }
        .status-text {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 20px;
            height: 30px;
        }
        .mic-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--dourado);
            border: none;
            cursor: pointer;
            font-size: 2.5rem;
            color: var(--preto);
            box-shadow: 0 0 20px rgba(245, 197, 66, 0.5);
            transition: all 0.3s ease;
        }
        .mic-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(245, 197, 66, 0.8);
        }
        .mic-button.is-listening {
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.5); background: #ff4444; }
            50% { box-shadow: 0 0 40px rgba(255, 68, 68, 1); background: #ff6b6b; }
            100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.5); background: #ff4444; }
        }
    </style>
</head>
<body>
    <div class="dashboard-bg-grid"></div>
    <div class="ai-tutor-container">
        <h1 class="neon-text" style="margin-bottom: 15px;">{{ course.title }}</h1>
        <p style="color: #aaa; margin-bottom: 40px;">Treinamento para Prova Oral</p>

        <div id="voice-visualizer"></div>
        <p id="status" class="status-text">Pressione o botão para começar</p>
        
        <button id="mic-button" class="mic-button">
            <i class="fas fa-microphone"></i>
        </button>
    </div>

    <script>
        // Lógica básica da interface (sem a API do ElevenLabs ainda)
        const micButton = document.getElementById('mic-button');
        const statusText = document.getElementById('status');
        let isListening = false;

        micButton.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                micButton.classList.add('is-listening');
                statusText.textContent = "Ouvindo...";
                // Aqui você iniciaria a captura de áudio
            } else {
                micButton.classList.remove('is-listening');
                statusText.textContent = "Processando...";
                // Aqui você pararia a captura e enviaria para a API
            }
        });
    </script>
</body>
</html>
