{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container" style="padding-top: 150px; text-align: center; min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <i class="fas fa-lock" style="font-size: 5rem; color: #ff4d4d; margin-bottom: 20px;"></i>
    <h1 class="neon-text" style="color: #ff4d4d; text-shadow: 0 0 10px rgba(255, 77, 77, 0.7);">Acesso Expirado</h1>
    <p style="font-size: 1.5rem; max-width: 600px; margin: 20px auto;">
        Su acceso al curso <strong>{{ course_title }}</strong> ha vencido.
    </p>
    <p style="color: #ccc; margin-bottom: 40px;">
        Para continuar aprendiendo y acceder a todo el contenido, por favor renueve su suscripción.
    </p>
    
    <a href="{% url 'payments:create_payment' course_id %}" class="btn-3d-buy" style="font-size: 1.2rem; padding: 15px 40px;">
        RENOVAR ACCESO AHORA
    </a>
    
    <div style="margin-top: 30px;">
        <a href="{% url 'student_dashboard' %}" style="color: var(--dourado); text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Volver a Mis cursos
        </a>
    </div>
</div>
{% endblock %}
