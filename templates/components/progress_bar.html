<div class="progress-bar-container" style="background: rgba(0,0,0,0.06); border-radius: 999px; height: 8px; width: 100%; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);">
    <div class="progress-bar-fill" style="background: linear-gradient(90deg, var(--dourado) 0%, var(--laranja) 100%); height: 100%; width: {{ progress|default:0 }}%; border-radius: 999px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);"></div>
</div>
