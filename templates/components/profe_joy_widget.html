<style>
/* Profe Joy Floating Widget Styles */
#pj-widget-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    font-family: 'Inter', sans-serif;
}

#pj-toggle-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: 3px solid var(--accent);
    box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
}

#pj-toggle-btn:hover {
    transform: scale(1.1);
}

#pj-toggle-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#pj-chat-window {
    display: none;
    width: 380px;
    height: 600px;
    max-height: 80vh;
    background: var(--bg-surface);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    margin-bottom: 16px;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transform-origin: bottom right;
    animation: pj-pop-up 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes pj-pop-up {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
}

.pj-header {
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(109, 40, 217, 0.9));
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.pj-header-title {
    display: flex;
    align-items: center;
    gap: 12px;
}

.pj-header-title img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--accent);
}

.pj-header h3 {
    margin: 0;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
}

.pj-header p {
    margin: 0;
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.8rem;
}

.pj-close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
}

.pj-close-btn:hover {
    opacity: 1;
}

.pj-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(0, 0, 0, 0.2);
}

.pj-msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.5;
    word-wrap: break-word;
}

.pj-msg.bot {
    align-self: flex-start;
    background: rgba(147, 51, 234, 0.15);
    border: 1px solid rgba(147, 51, 234, 0.3);
    color: var(--text-main);
    border-bottom-left-radius: 4px;
}

.pj-msg.user {
    align-self: flex-end;
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 4px;
}

/* Markdown basic formatting in chat */
.pj-msg.bot p { margin-bottom: 8px; }
.pj-msg.bot p:last-child { margin-bottom: 0; }
.pj-msg.bot strong { color: var(--accent); }
.pj-msg.bot ul { padding-left: 20px; margin-bottom: 8px; }

.pj-input-area {
    padding: 16px;
    background: rgba(255, 255, 255, 0.02);
    border-top: 1px solid var(--glass-border);
    display: flex;
    gap: 10px;
}

.pj-input-area input {
    flex: 1;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 10px 16px;
    color: var(--text-main);
    outline: none;
    font-size: 0.95rem;
    transition: border-color 0.2s;
}

.pj-input-area input:focus {
    border-color: var(--primary);
}

.pj-input-area button {
    background: var(--primary);
    color: #fff;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s;
}

.pj-input-area button:hover {
    background: var(--primary-dark);
}

.pj-loading {
    display: none;
    align-self: flex-start;
    gap: 4px;
    padding: 12px 16px;
    background: rgba(147, 51, 234, 0.1);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
}

.pj-loading span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pj-bounce 1.4s infinite ease-in-out both;
}

.pj-loading span:nth-child(1) { animation-delay: -0.32s; }
.pj-loading span:nth-child(2) { animation-delay: -0.16s; }

@keyframes pj-bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

@media (max-width: 480px) {
    #pj-chat-window {
        width: calc(100vw - 32px);
        height: 60vh;
        right: 16px;
        bottom: 80px;
        margin-bottom: 0;
    }
}
</style>

<div id="pj-widget-container">
    <div id="pj-chat-window">
        <div class="pj-header">
            <div class="pj-header-title">
                <img src="{% static 'images/joy_avatar.jpg' %}" alt="Profe Joy" onerror="this.src='https://ui-avatars.com/api/?name=Profe+Joy&background=7c3aed&color=fff'">
                <div>
                    <h3>Profe Joy IA</h3>
                    <p>ALUMED Conecta</p>
                </div>
            </div>
            <button class="pj-close-btn" onclick="toggleProfeJoy()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="pj-messages" id="pj-messages-container">
            <div class="pj-msg bot">
                ¡Holis doc! 👋 Soy la Profe Joy. Estoy acá para acompañarte y resolver cualquier duda que tengas. ¿En qué te ayudo hoy?
            </div>
            <div class="pj-loading" id="pj-typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <form class="pj-input-area" id="pj-chat-form" onsubmit="handleProfeJoySubmit(event)">
            <input type="text" id="pj-chat-input" placeholder="Pregúntale a la Profe Joy..." autocomplete="off">
            <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <button id="pj-toggle-btn" onclick="toggleProfeJoy()">
        <img src="{% static 'images/joy_avatar.jpg' %}" alt="Profe Joy" onerror="this.src='https://ui-avatars.com/api/?name=Profe+Joy&background=FFE600&color=120924'">
    </button>
</div>

<script>
    // Profe Joy Chat Logic
    let pjChatHistory = [];
    const pjChatEndpoint = '/profe-joy/chat/';

    function toggleProfeJoy() {
        const chatWindow = document.getElementById('pj-chat-window');
        if (chatWindow.style.display === 'flex') {
            chatWindow.style.display = 'none';
        } else {
            chatWindow.style.display = 'flex';
            document.getElementById('pj-chat-input').focus();
        }
    }

    function parseMarkdown(text) {
        if (!text) return '';
        // Bold
        let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Newlines to paragraphs/br
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        return '<p>' + html + '</p>';
    }

    function appendPJMessage(role, content) {
        const container = document.getElementById('pj-messages-container');
        const indicator = document.getElementById('pj-typing-indicator');
        
        const msgDiv = document.createElement('div');
        msgDiv.className = 'pj-msg ' + role;
        
        if (role === 'bot') {
            msgDiv.innerHTML = parseMarkdown(content);
        } else {
            msgDiv.textContent = content;
        }

        container.insertBefore(msgDiv, indicator);
        container.scrollTop = container.scrollHeight;
    }

    async function handleProfeJoySubmit(e) {
        e.preventDefault();
        const input = document.getElementById('pj-chat-input');
        const text = input.value.trim();
        if (!text) return;

        // User msg
        appendPJMessage('user', text);
        pjChatHistory.push({ role: 'user', content: text });
        input.value = '';

        // Show typing
        const indicator = document.getElementById('pj-typing-indicator');
        indicator.style.display = 'flex';
        document.getElementById('pj-messages-container').scrollTop = document.getElementById('pj-messages-container').scrollHeight;

        try {
            const response = await fetch(pjChatEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    question: text,
                    history: pjChatHistory
                })
            });

            if (!response.ok) throw new Error('API Error');

            const data = await response.json();
            const answer = data.answer || "Uy, me dio un pequeño mareo. ¿Me repetís la pregunta?";
            
            appendPJMessage('bot', answer);
            pjChatHistory.push({ role: 'model', content: answer });

        } catch (error) {
            console.error(error);
            appendPJMessage('bot', "Tuvimos un problemita de conexión. ¡Intentá de nuevo!");
        } finally {
            indicator.style.display = 'none';
        }
    }
</script>
