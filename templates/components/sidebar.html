{% load static %}
<!-- ==========================================
     MENU LATERAL DINÁMICO (GLASSMORPHISM)
     ========================================== -->
<aside class="glass-sidebar" id="sidebar">
    <!-- Cabeçalho / Logo -->
    <div class="sidebar-header">
        <div class="logo-glow"></div>
        <h2>ALUMED <span>OS</span></h2>
    </div>

    <!-- Container Dinâmico: O JS vai trocar os links aqui dentro -->
    <ul class="nav-list" id="dynamic-nav">
        <!-- O conteúdo inicial será renderizado pelo JavaScript -->
    </ul>

    <!-- Rodapé Fixo da Lateral -->
    <div class="sidebar-footer">
        <hr class="glass-divider">
        
        <!-- Club ALUMED -->
        <a href="{% url 'club' %}" class="nav-item">
            <span class="icon">⭐</span>
            <span class="text">Club ALUMED</span>
        </a>

        {% if request.user.is_authenticated %}
            <!-- Mostra Perfil se estiver logado -->
            <a href="{% url 'account_details' %}" class="nav-item">
                <span class="icon">⚙️</span>
                <span class="text">Configuración</span>
            </a>
            <a href="{% url 'logout' %}" class="nav-item">
                <span class="icon">🚪</span>
                <span class="text">Cerrar Sesión</span>
            </a>
        {% else %}
            <!-- Mostra Login se for visitante -->
            <a href="{% url 'login' %}" class="nav-item">
                <span class="icon">🔑</span>
                <span class="text">Iniciar Sesión</span>
            </a>
        {% endif %}
    </div>
</aside>

<style>
/* =========================================
   ESTILOS GLASSMORPHISM E NEUROCIÊNCIA
   ========================================= */
.glass-sidebar {
    width: 260px;
    height: 100vh;
    background: rgba(15, 17, 26, 0.6); /* Fundo escuro premium */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    font-family: 'Open Sans', sans-serif;
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
}

.sidebar-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding-left: 8px;
}

.sidebar-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.5px;
}

.sidebar-header h2 span {
    color: #8a2be2; /* Roxo ALUMED */
}

/* O brilho do Logo */
.logo-glow {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #8a2be2, #00bfff);
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
    flex-grow: 1; /* Empurra o rodapé para baixo */
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* Estilo Base dos Links */
.nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    text-decoration: none;
    color: #a0aec0;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 1px solid transparent;
}

/* Efeito Hover (Foco e Memória - Tons Frios) */
.nav-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: #ffffff;
    transform: translateX(5px);
}

.nav-item.active {
    background: rgba(138, 43, 226, 0.15);
    color: #ffffff;
    border: 1px solid rgba(138, 43, 226, 0.3);
    box-shadow: inset 0 0 20px rgba(138, 43, 226, 0.1);
}

/* Bloco Conecta FCM (Alerta Dopaminérgico - Tons Quentes) */
.conecta-alert {
    color: #ffd700;
    background: rgba(255, 215, 0, 0.05);
    border: 1px solid rgba(255, 215, 0, 0.2);
}

.conecta-alert:hover {
    background: rgba(255, 215, 0, 0.15);
    color: #fff;
    box-shadow: 0 0 15px rgba(255, 165, 0, 0.3);
}

.glass-divider {
    border: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 20px 0;
}
</style>

<!-- ==========================================
     O CÉREBRO: JAVASCRIPT DINÂMICO
     ========================================== -->
<script>
// 1. O Mapa da Plataforma
const mundos = {
    // Menu Padrão (Inicio)
    inicio: [
        { icon: '🏠', text: 'Inicio', link: "{% url 'home' %}", active: true },
        { icon: '📚', text: 'Mis Cursos', link: "{% url 'student_dashboard' %}" },
        { icon: '🎯', text: 'Simulacros', link: "{% url 'simulacros' %}" },
        { icon: '🧠', text: 'Biblioteca IA', link: "{% url 'biblioteca' %}" },
        { icon: '👩‍🏫', text: 'IA Profe Joy', link: "{% url 'profe_joy_chat' %}" },
        { icon: '🔬', text: 'Microscopio', link: "{% url 'microscopio_virtual' %}" },
        { icon: '🧬', text: 'Anatomía 3D', link: "{% url 'anatomia_3d' %}" }
    ],
    // Menu quando o aluno entra nos Simulacros
    simulacros: [
        { icon: '⬅️', text: 'Volver a Inicio', link: "#", action: "changeWorld('inicio')" },
        { icon: '🎯', text: 'Panel de Simulacros', link: "{% url 'student_dashboard' %}", active: true },
        { icon: '🧫', text: 'Histo y Embrio', link: "{% url 'student_dashboard' %}" },
        { icon: '🦴', text: 'Anatomía Cátedra A', link: "{% url 'student_dashboard' %}" },
        { icon: '🦴', text: 'Anatomía Cátedra B', link: "{% url 'student_dashboard' %}" },
        { icon: '🦴', text: 'Anatomía Cátedra C', link: "{% url 'student_dashboard' %}" },
        { icon: '📊', text: 'Mis Resultados', link: "{% url 'student_dashboard' %}" }
    ],
    // Menu quando o aluno clica no Conecta FCM
    conecta: [
        { icon: '⬅️', text: 'Volver a ALUMED', link: "{% url 'home' %}" },
        { icon: '📢', text: 'Cartelera en Vivo', link: "{% url 'cartelera_view' %}", active: true },
        { icon: '🚨', text: 'Parciales y Finales', link: "{% url 'cronograma_finales' %}" },
        { icon: '👥', text: 'Comisiones', link: "{% url 'comisiones' %}" },
        { icon: '🗓️', text: 'Cronograma de TPs', link: "{% url 'cronograma_tps' %}" },
        { icon: '📍', text: 'Mapa de la Facultad', link: "{% url 'mapa_facultad' %}" },
        { icon: '🧠', text: 'Apoyo Psicológico', link: "{% url 'apoyo_psicologico' %}" }
    ]
};

// 2. A Função de Renderização
function renderMenu(mundo) {
    const navContainer = document.getElementById('dynamic-nav');
    if(!navContainer) return;
    navContainer.innerHTML = ''; // Limpa o menu atual

    // Gera os novos links dinamicamente
    mundos[mundo].forEach(item => {
        const li = document.createElement('li');
        
        // Se o item tem uma ação (trocar de mundo), injeta o onclick
        const clickAction = item.action ? `onclick="event.preventDefault(); ${item.action}"` : '';
        const activeClass = item.active ? 'active' : '';

        li.innerHTML = `
            <a href="${item.link}" class="nav-item ${activeClass}" ${clickAction}>
                <span class="icon">${item.icon}</span>
                <span class="text">${item.text}</span>
            </a>
        `;
        navContainer.appendChild(li);
    });
}

// 3. Função para trocar de mundo (acionada pelos botões)
window.changeWorld = function(mundo) {
    renderMenu(mundo);
};

// Inicia a plataforma com o menu padrão
document.addEventListener('DOMContentLoaded', () => {
    // Initialize based on current URL or default to 'inicio'
    let initialWorld = 'inicio';
    const currentPath = window.location.pathname;
    
    if(currentPath.includes('/conecta') || currentPath.includes('/cartelera') || currentPath.includes('/comisiones') || currentPath.includes('/cronograma')) {
        initialWorld = 'conecta';
    } else if (currentPath.includes('/simulacros') || currentPath.includes('/dashboard')) {
        initialWorld = 'simulacros';
    }
    
    renderMenu(initialWorld);
});
</script>
