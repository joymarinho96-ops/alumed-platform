{% load static %}
<header class="dashboard-header-bar" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; background: rgba(30, 17, 59, 0.35); border-bottom: 1px solid rgba(124, 58, 237, 0.2); border-radius: 12px; margin-bottom: 30px; backdrop-filter: blur(10px);">
    <!-- Left: Breadcrumb / Page Title Placeholder -->
    <div class="header-left">
        <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.15rem; font-weight: 700; color: white; margin: 0; display: flex; align-items: center; gap: 8px;">
            {% if icon %}<i class="fas {{ icon }}" style="color: var(--dourado);"></i>{% endif %}
            {{ page_title|default:"Panel de Estudiante" }}
        </h2>
    </div>

    <!-- Right: Quick actions -->
    <div class="header-right" style="display: flex; align-items: center; gap: 20px;">
        <!-- Notification Bell -->
        <div class="header-notification-bell" style="position: relative; cursor: pointer; color: #cbd5e1; font-size: 1.1rem; transition: color 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#cbd5e1'">
            <i class="far fa-bell"></i>
            {% if has_new_notifications %}
                <span style="position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%;"></span>
            {% endif %}
        </div>

        <!-- Quick Profile Link -->
        <div class="header-profile-link" onclick="openProfileModal()" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--roxo-acento); display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px; color: white; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.1);">
                {% if user.profile.photo %}
                    <img src="{{ user.profile.photo.url }}" alt="{{ user.username }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    {{ user.username|first|upper }}
                {% endif %}
            </div>
            <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #cbd5e1;" class="d-none d-sm-inline">{{ user.first_name|default:user.username }}</span>
        </div>
    </div>
</header>
